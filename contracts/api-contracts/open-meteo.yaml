# Frozen Bronze schema contract for SRC-Open-Meteo / nyc_weather_forecast.
#
# Source: config/sources/open_meteo.yaml
# Confirmed against a live sample of bronze/raw/SRC-Open-Meteo/nyc_weather_forecast/
# (see docs/01-architecture/decisions/week3-Build_Silver_Layer.md step 2 — schema freeze).
#
# Any upstream change to these fields must be escalated per CLAUDE.md
# ("Escalate to human when ... upstream Socrata/API schema has changed").

source_id: SRC-Open-Meteo
dataset: nyc_weather_forecast
api_type: open_meteo
partition_strategy: daily

# CRITICAL: query_params.timezone=America/New_York on the upstream call means
# every `time` string below is LOCAL New York time with NO UTC offset suffix.
# Naively parsing it as UTC silently shifts every record by 4-5 hours.
source_timezone: America/New_York

fields:
  - name: time
    raw_type: string
    format: "YYYY-MM-DDTHH:MM"  # no offset, no 'Z' — local NY time
    nullable: false
    role: timestamp_field

  - name: temperature_2m
    raw_type: double
    unit: celsius
    nullable: true
    valid_range: [-40, 50]

  - name: precipitation
    raw_type: double
    unit: mm
    nullable: true
    valid_range: [0, null]

  - name: snowfall
    raw_type: double
    unit: cm
    nullable: true
    valid_range: [0, null]

  - name: windspeed_10m
    raw_type: double
    unit: "km/h"
    nullable: true
    valid_range: [0, 200]

notes:
  - "Each daily Bronze file covers past_days=3 + forecast_days=7 → the same
     UTC hour appears in multiple daily files with different forecast values.
     Silver must dedupe by keeping the most recently ingested value per hour."
  - "Silver grain is one row per UTC hour, citywide (single lat/lon station).
     Borough broadcast join (ST_CONTAINS against dim_geography) happens in
     the Gold layer, not here."
