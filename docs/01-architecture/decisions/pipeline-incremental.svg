<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'SF Mono', 'Fira Mono', monospace" font-size="11">
  <title>NYC-UOIP Incremental Ingestion Pipeline</title>
  <desc>Daily incremental pipeline: three source DAGs feed Bronze and Silver layers, then converge at a Gold DAG for Load Score computation.</desc>

  <!-- Background -->
  <rect width="900" height="620" fill="#0f1117"/>

  <!-- Legend -->
  <rect x="24" y="16" width="10" height="10" rx="2" fill="#3b82f6"/>
  <text x="40" y="25" fill="#9ca3af" font-size="10">Airflow DAG</text>
  <rect x="120" y="16" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="136" y="25" fill="#9ca3af" font-size="10">Compute (Spark)</text>
  <rect x="230" y="16" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="246" y="25" fill="#9ca3af" font-size="10">Storage Layer</text>
  <rect x="330" y="16" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="346" y="25" fill="#9ca3af" font-size="10">Gold / BQ</text>

  <!-- Column headers -->
  <text x="90"  y="58" fill="#6b7280" font-size="10" text-anchor="middle">TRIGGER</text>
  <text x="235" y="58" fill="#6b7280" font-size="10" text-anchor="middle">BRONZE</text>
  <text x="420" y="58" fill="#6b7280" font-size="10" text-anchor="middle">SILVER (Spark)</text>
  <text x="620" y="58" fill="#6b7280" font-size="10" text-anchor="middle">SENSOR / WAIT</text>
  <text x="800" y="58" fill="#6b7280" font-size="10" text-anchor="middle">GOLD</text>

  <!-- Separator lines -->
  <line x1="155" y1="45" x2="155" y2="590" stroke="#1f2937" stroke-width="1"/>
  <line x1="320" y1="45" x2="320" y2="590" stroke="#1f2937" stroke-width="1"/>
  <line x1="530" y1="45" x2="530" y2="590" stroke="#1f2937" stroke-width="1"/>
  <line x1="710" y1="45" x2="710" y2="590" stroke="#1f2937" stroke-width="1"/>

  <!-- LANE 1: NYC 311 -->
  <text x="16" y="110" fill="#60a5fa" font-size="9">daily · 06:00 UTC</text>
  <rect x="20" y="115" width="130" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="85" y="133" fill="#93c5fd" font-size="10" text-anchor="middle" font-weight="bold">dag_daily_nyc_311</text>
  <text x="85" y="148" fill="#60a5fa" font-size="9" text-anchor="middle">PythonOperator</text>
  <line x1="150" y1="137" x2="170" y2="137" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <rect x="170" y="115" width="140" height="44" rx="6" fill="#14291a" stroke="#10b981" stroke-width="1.2"/>
  <text x="240" y="131" fill="#6ee7b7" font-size="10" text-anchor="middle" font-weight="bold">GCS Bronze</text>
  <text x="240" y="144" fill="#34d399" font-size="9" text-anchor="middle">bronze/raw/SRC-NYC-311</text>
  <text x="240" y="155" fill="#34d399" font-size="9" text-anchor="middle">{YYYY-MM}/data_{date}.json</text>
  <line x1="310" y1="137" x2="330" y2="137" stroke="#10b981" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <rect x="330" y="115" width="190" height="44" rx="6" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="425" y="131" fill="#c4b5fd" font-size="10" text-anchor="middle" font-weight="bold">Spark Silver · etl_nyc_311</text>
  <text x="425" y="144" fill="#a78bfa" font-size="9" text-anchor="middle">DataprocSubmitJobOperator</text>
  <text x="425" y="155" fill="#a78bfa" font-size="9" text-anchor="middle">→ silver/fact_311_complaints</text>
  <line x1="520" y1="137" x2="540" y2="137" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arr-purple)"/>
  <circle cx="570" cy="137" r="8" fill="#374151" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="570" y="141" fill="#c4b5fd" font-size="9" text-anchor="middle">✓</text>

  <!-- LANE 2: NYPD -->
  <text x="16" y="215" fill="#60a5fa" font-size="9">monthly · 3rd 05:00 UTC</text>
  <rect x="20" y="220" width="130" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="85" y="238" fill="#93c5fd" font-size="10" text-anchor="middle" font-weight="bold">dag_daily_nypd</text>
  <text x="85" y="253" fill="#60a5fa" font-size="9" text-anchor="middle">PythonOperator</text>
  <line x1="150" y1="242" x2="170" y2="242" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <rect x="170" y="220" width="140" height="44" rx="6" fill="#14291a" stroke="#10b981" stroke-width="1.2"/>
  <text x="240" y="236" fill="#6ee7b7" font-size="10" text-anchor="middle" font-weight="bold">GCS Bronze</text>
  <text x="240" y="249" fill="#34d399" font-size="9" text-anchor="middle">bronze/raw/SRC-NYPD</text>
  <text x="240" y="260" fill="#34d399" font-size="9" text-anchor="middle">data_{YYYY-MM}.json</text>
  <line x1="310" y1="242" x2="330" y2="242" stroke="#10b981" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <rect x="330" y="220" width="190" height="44" rx="6" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="425" y="236" fill="#c4b5fd" font-size="10" text-anchor="middle" font-weight="bold">Spark Silver · etl_nypd</text>
  <text x="425" y="249" fill="#a78bfa" font-size="9" text-anchor="middle">DataprocSubmitJobOperator</text>
  <text x="425" y="260" fill="#a78bfa" font-size="9" text-anchor="middle">→ silver/fact_collisions</text>
  <line x1="520" y1="242" x2="540" y2="242" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arr-purple)"/>
  <circle cx="570" cy="242" r="8" fill="#374151" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="570" y="246" fill="#c4b5fd" font-size="9" text-anchor="middle">✓</text>

  <!-- LANE 3: Open-Meteo -->
  <text x="16" y="320" fill="#60a5fa" font-size="9">daily · 05:00 UTC</text>
  <rect x="20" y="325" width="130" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="85" y="343" fill="#93c5fd" font-size="10" text-anchor="middle" font-weight="bold">dag_daily_weather</text>
  <text x="85" y="358" fill="#60a5fa" font-size="9" text-anchor="middle">PythonOperator</text>
  <line x1="150" y1="347" x2="170" y2="347" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <rect x="170" y="325" width="140" height="44" rx="6" fill="#14291a" stroke="#10b981" stroke-width="1.2"/>
  <text x="240" y="341" fill="#6ee7b7" font-size="10" text-anchor="middle" font-weight="bold">GCS Bronze</text>
  <text x="240" y="354" fill="#34d399" font-size="9" text-anchor="middle">bronze/raw/SRC-Open-Meteo</text>
  <text x="240" y="365" fill="#34d399" font-size="9" text-anchor="middle">{YYYY-MM}/data_{date}.json</text>
  <line x1="310" y1="347" x2="330" y2="347" stroke="#10b981" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <rect x="330" y="325" width="190" height="44" rx="6" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="425" y="341" fill="#c4b5fd" font-size="10" text-anchor="middle" font-weight="bold">Spark Silver · etl_weather</text>
  <text x="425" y="354" fill="#a78bfa" font-size="9" text-anchor="middle">DataprocSubmitJobOperator</text>
  <text x="425" y="365" fill="#a78bfa" font-size="9" text-anchor="middle">→ silver/fact_weather</text>
  <line x1="520" y1="347" x2="540" y2="347" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arr-purple)"/>
  <circle cx="570" cy="347" r="8" fill="#374151" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="570" y="351" fill="#c4b5fd" font-size="9" text-anchor="middle">✓</text>

  <!-- LANE 4: DCP -->
  <text x="16" y="425" fill="#60a5fa" font-size="9">weekly · Mon 04:00 UTC</text>
  <rect x="20" y="430" width="130" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="85" y="448" fill="#93c5fd" font-size="10" text-anchor="middle" font-weight="bold">dag_weekly_dcp</text>
  <text x="85" y="463" fill="#60a5fa" font-size="9" text-anchor="middle">PythonOperator</text>
  <line x1="150" y1="452" x2="170" y2="452" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <rect x="170" y="430" width="140" height="44" rx="6" fill="#14291a" stroke="#10b981" stroke-width="1.2"/>
  <text x="240" y="446" fill="#6ee7b7" font-size="10" text-anchor="middle" font-weight="bold">GCS Bronze</text>
  <text x="240" y="459" fill="#34d399" font-size="9" text-anchor="middle">bronze/raw/SRC-DCP</text>
  <text x="240" y="470" fill="#34d399" font-size="9" text-anchor="middle">data_static.json</text>
  <line x1="310" y1="452" x2="330" y2="452" stroke="#10b981" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <rect x="330" y="430" width="190" height="44" rx="6" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="425" y="446" fill="#c4b5fd" font-size="10" text-anchor="middle" font-weight="bold">Spark Silver · etl_dcp</text>
  <text x="425" y="459" fill="#a78bfa" font-size="9" text-anchor="middle">DataprocSubmitJobOperator</text>
  <text x="425" y="470" fill="#a78bfa" font-size="9" text-anchor="middle">→ silver/dim_geography</text>
  <line x1="520" y1="452" x2="540" y2="452" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arr-purple)"/>
  <circle cx="570" cy="452" r="8" fill="#374151" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="570" y="456" fill="#c4b5fd" font-size="9" text-anchor="middle">✓</text>

  <!-- Convergence -->
  <line x1="570" y1="137" x2="570" y2="452" stroke="#6b7280" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="570" y1="295" x2="720" y2="295" stroke="#f59e0b" stroke-width="1.4" marker-end="url(#arr-amber)"/>
  <rect x="590" y="270" width="114" height="20" rx="4" fill="#1c1712" stroke="#d97706" stroke-width="1"/>
  <text x="647" y="283" fill="#fbbf24" font-size="8.5" text-anchor="middle">ExternalTaskSensor × 3</text>

  <!-- Gold DAG -->
  <rect x="720" y="248" width="158" height="94" rx="8" fill="#1c1407" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="799" y="268" fill="#fcd34d" font-size="10" text-anchor="middle" font-weight="bold">dag_gold_daily</text>
  <line x1="725" y1="274" x2="873" y2="274" stroke="#d97706" stroke-width="0.6"/>
  <text x="799" y="289" fill="#fbbf24" font-size="9" text-anchor="middle">BigQueryInsertJobOperator</text>
  <text x="799" y="303" fill="#fbbf24" font-size="9" text-anchor="middle">JOIN 311+NYPD+Weather</text>
  <text x="799" y="317" fill="#fbbf24" font-size="9" text-anchor="middle">→ fact_load_score</text>
  <text x="799" y="331" fill="#fbbf24" font-size="9" text-anchor="middle">→ fact_recommendations</text>

  <!-- Footer note -->
  <rect x="20" y="510" width="860" height="36" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="450" y="524" fill="#9ca3af" font-size="9" text-anchor="middle">All tasks use execution_date (T-1) — idempotent re-run safe. 311 applies 7-day lookback window. NYPD triggers on monthly schedule only.</text>
  <text x="450" y="537" fill="#6b7280" font-size="9" text-anchor="middle">Failure isolation: each source DAG is independent. Gold DAG skips if any Sensor times out (SLA = 4h after trigger).</text>

  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
