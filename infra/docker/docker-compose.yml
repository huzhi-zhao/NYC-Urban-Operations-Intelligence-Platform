version: '3.8'

# Phase 1 Airflow stack — schedules backfill DAGs that upload to GCS.
# Spark/Trino/MinIO are Phase 2 and not included here.

x-airflow-common: &airflow-common
  image: apache/airflow:3.2.2-python3.11
  env_file:
    - ../../.env
  networks:
    - bigdata-net
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__WEBSERVER__SECRET_KEY: 'nyc-uoip-secret-change-me'
    AIRFLOW__CORE__AUTH_MANAGER: 'airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: 'nyc-uoip-jwt-secret-change-me'
    AIRFLOW__API_AUTH__JWT_ISSUER: 'airflow'
    PYTHONPATH: /opt/airflow/plugins
  volumes:
    - ../../dags:/opt/airflow/dags
    - ../../ingestion:/opt/airflow/plugins/ingestion
    - ../../scripts:/opt/airflow/plugins/scripts
    - ../../config:/opt/airflow/plugins/config
    - ../../infra/terraform/keys:/opt/airflow/keys:ro
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --no-cache-dir pydantic>=2.0 pyyaml requests python-dotenv google-cloud-storage apache-airflow-providers-fab &&
        airflow db migrate &&
        airflow users create --username admin --password zc1992 --firstname NYC --lastname UOIP --role Admin --email admin@nyc-uoip.local
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --no-cache-dir pydantic>=2.0 pyyaml requests python-dotenv google-cloud-storage apache-airflow-providers-fab &&
        airflow api-server
      "
    ports:
      - "28080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --no-cache-dir pydantic>=2.0 pyyaml requests python-dotenv google-cloud-storage apache-airflow-providers-fab &&
        airflow scheduler
      "
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--limit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-dag-processor:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --no-cache-dir pydantic>=2.0 pyyaml requests python-dotenv google-cloud-storage apache-airflow-providers-fab &&
        airflow dag-processor
      "

volumes:
  postgres-db:
  airflow-logs:

networks:
  bigdata-net:
    external: true
