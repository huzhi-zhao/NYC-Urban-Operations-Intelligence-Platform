# Phase 1 Airflow stack — schedules backfill/ingest DAGs that read/write GCS,
# and now submits Silver Spark jobs to the standalone Spark cluster
# (spark-master:7077), defined below in the same file/network. Storage stays
# on GCS; only the compute engine moved off Dataproc.
#
# spark-master/spark-worker were previously started from a separate
# standalone compose file (/opt/pace_lab/spark/docker-compose.yml on the
# Ubuntu host) — stop that stack before bringing this one up, since both
# define containers named spark-master/spark-worker on the same external
# bigdata-net network and the names will collide otherwise:
#   docker compose -f /opt/pace_lab/spark/docker-compose.yml down

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - ../../.env
  networks:
    - bigdata-net
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__WEBSERVER__SECRET_KEY: 'nyc-uoip-secret-change-me'
    AIRFLOW__CORE__AUTH_MANAGER: 'airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: 'nyc-uoip-jwt-secret-change-me'
    AIRFLOW__API_AUTH__JWT_ISSUER: 'airflow'
    PYTHONPATH: /opt/airflow/plugins
    # Spark connection consumed by SparkSubmitOperator(conn_id="spark_default").
    # spark-master must already be reachable by container name on bigdata-net.
    AIRFLOW_CONN_SPARK_DEFAULT: 'spark://spark-master:7077?deploy-mode=client'
  volumes:
    - ../../dags:/opt/airflow/dags
    - ../../ingestion:/opt/airflow/plugins/ingestion
    - ../../scripts:/opt/airflow/plugins/scripts
    - ../../config:/opt/airflow/plugins/config
    - ../../spark:/opt/airflow/plugins/spark
    - ../../infra/terraform/keys:/opt/airflow/keys:ro
    - ../../data:/opt/airflow/data:ro
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password zc1992 --firstname NYC --lastname UOIP --role Admin --email admin@nyc-uoip.local
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow api-server
    ports:
      - "28080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--limit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-dag-processor:
    <<: *airflow-common
    command: airflow dag-processor

  spark-master:
    image: apache/spark:3.5.1  # master only coordinates — no UDFs run here
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    environment:
      # Master/Worker normally hardcode http://<host>:<webUiPort> links,
      # which breaks behind the nginx https reverse proxy (wrong scheme,
      # wrong port, and the worker isn't even publicly exposed). Enabling
      # Spark's own reverse-proxy mode makes the Master UI link to workers
      # via relative paths under its own host (/proxy/<worker-id>/) and
      # forward the request server-side instead of redirecting the browser.
      SPARK_MASTER_OPTS: >-
        -Dspark.ui.reverseProxy=true
        -Dspark.ui.reverseProxyUrl=https://spark.jimmypink.dpdns.org
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - bigdata-net
    restart: unless-stopped

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark-worker
    container_name: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    environment:
      # Must match spark-master's reverseProxy setting — the worker also
      # needs to know it's served via the master's proxy path, not its own
      # host:port. No public port mapping needed: the worker UI is only
      # reached internally, via the master's proxy, over bigdata-net.
      SPARK_WORKER_OPTS: -Dspark.ui.reverseProxy=true
    volumes:
      # Same GCS service-account key Airflow uses — executors need it to
      # read/write gs:// directly. Path must match the
      # spark.hadoop.google.cloud.auth.service.account.json.keyfile conf
      # set in dags/dag_silver_open_meteo.py.
      - ../../infra/terraform/keys/nyc-uoip-sa-key.json:/opt/airflow/keys/nyc-uoip-sa-key.json:ro
      # Module-reference UDFs (e.g. spark/transforms/dcp.py's geojson_to_wkt_udf)
      # get cloudpickled by qualified name ("spark.transforms.dcp.<func>"), not
      # by value — the Executor's Python worker subprocess has to `import spark`
      # to resolve them at deserialize time. Mount at the same path Airflow uses
      # (/opt/airflow/plugins/spark) so the qualified name resolves identically
      # on both sides; paired with spark.executorEnv.PYTHONPATH in
      # dags/_spark_common.py.
      - ../../spark:/opt/airflow/plugins/spark:ro
    networks:
      - bigdata-net
    restart: unless-stopped

volumes:
  postgres-db:
  airflow-logs:

networks:
  bigdata-net:
    external: true
